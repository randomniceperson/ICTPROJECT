<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Looking Back — Our Future Careers</title>

<link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Indie Flower', cursive;
    background: #f4f4f4;
    color: #222;
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    padding: 12px 0;
    text-align: center;
    z-index: 1000;
}

nav a {
    margin: 0 14px;
    text-decoration: none;
    color: #333;
    font-size: 14px;
    position: relative;
    user-select: none;
    cursor: pointer;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0%;
    height: 1px;
    background: #333;
    transition: 0.3s;
}

nav a:hover::after {
    width: 100%;
}

/* SECTIONS */
section {
    position: absolute;
    top: 60px;
    width: 100%;
    height: calc(100% - 60px);
    padding: 60px 20px;
    overflow-y: auto;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
}

section.active {
    opacity: 1;
    pointer-events: auto;
}

/* CONTENT */
.content {
    max-width: 720px;
    margin: auto;
}

/* TEXT */
h1 { font-size: 30px; }
h2 {
    margin-top: 30px;
    border-left: 3px solid #aaa;
    padding-left: 10px;
}

p { line-height: 1.8; }

/* IMAGE PLACEHOLDER */
.img-placeholder {
    width: 100%;
    height: 220px;
    background: #ddd;
    border-radius: 12px;
    margin: 15px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #777;
}

/* IMAGE */
.section-img {
    width: 100%;
    border-radius: 12px;
    margin: 15px 0;
}

/* GALLERY */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.gallery img {
    width: 150px;
    border-radius: 10px;
}

/* CONTACT */
.contact {
    background: #eee;
    padding: 15px;
    border-radius: 10px;
}

/* 🧩 PAPER PANEL TRANSITION */
#panel-transition {
    position: fixed;
    inset: 0;
    z-index: 2000;
    pointer-events: none;
}

.panel {
    position: absolute;
    width: 50%;
    height: 100%;
    top: 0;
    background-size: cover;
    background-position: center;
    transition: transform 0.9s ease;
}

/* 👇 CHANGE THESE IMAGES */
.panel.left {
    left: 0;
    transform: translateX(-100%);
    background-image: url('https://www.onlygfx.com/wp-content/uploads/2020/02/crumpled-up-ball-paper-2.png');
}

.panel.right {
    right: 0;
    transform: translateX(100%);
    background-image: url('https://www.onlygfx.com/wp-content/uploads/2020/02/crumpled-up-ball-paper-2.png');
}

.panel.active.left {
    transform: translateX(0);
}

.panel.active.right {
    transform: translateX(0);
}

/* ✍️ TYPEWRITER */
.type {
    border-right: 2px solid #333;
    white-space: nowrap;
    overflow: hidden;
}

</style>
</head>

<body>

<nav>
<a onclick="switchSection('home')">Home</a>
<a onclick="switchSection('about')">About</a>
<a onclick="switchSection('career')">Career</a>
<a onclick="switchSection('future')">Reflection</a>
<a onclick="switchSection('gallery')">Gallery</a>
<a onclick="switchSection('contact')">Contact</a>
</nav>

<!-- PANEL TRANSITION -->
<div id="panel-transition">
<div class="panel left"></div>

<!-- HOME -->

<script>

const leftPanel = document.querySelector('.panel.left');
const rightPanel = document.querySelector('.panel.right');

let current = document.querySelector('.active');

function switchSection(id) {
    if (current.id === id) return;

    const next = document.getElementById(id);

    /* CLOSE (SLOW) */
    leftPanel.classList.add('active');
    rightPanel.classList.add('active');

    setTimeout(() => {

        current.classList.remove('active');
        next.classList.add('active');
        current = next;

        startTyping(next);

        /* OPEN (DELAYED REVEAL) */
        setTimeout(() => {
            leftPanel.classList.remove('active');
            rightPanel.classList.remove('active');
        }, 300);

    }, 900); // slower close
}

/* TYPEWRITER (SLOWER) */
function startTyping(section) {
    const elements = section.querySelectorAll('.type');

    elements.forEach(el => {
        el.textContent = "";
        const text = el.getAttribute("data-text");
        let i = 0;

        function type() {
            if (i < text.length) {
                el.textContent += text.charAt(i);
                i++;
                setTimeout(type, 45); // 🔥 slower typing
            }
        }

        setTimeout(type, 200); // small delay before typing starts
    });
}

/* LOAD */
window.onload = () => {
    startTyping(document.querySelector('.active'));
};

</script>

</html>
